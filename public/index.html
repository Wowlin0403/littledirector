<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動計分系統</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .home {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      gap: 16px;
    }

    .home-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .home-btn {
      width: 100%;
      max-width: 320px;
      padding: 20px;
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .home-btn:active {
      transform: scale(0.97);
      box-shadow: 0 1px 6px rgba(61, 43, 31, 0.08);
    }

    .home-btn .icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .home-btn.primary .icon {
      background: var(--primary);
    }

    /* 設定 Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 24px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(61, 43, 31, 0.15);
    }

    .modal h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal label {
      display: block;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .modal input[type="number"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
    }

    .modal input[type="number"]:focus {
      border-color: var(--primary);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-cancel {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      background: var(--border);
      color: var(--text-muted);
      font-size: 16px;
      font-weight: 600;
    }

    .btn-confirm {
      flex: 2;
      padding: 14px;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 16px;
      font-weight: 600;
    }

    .group-status {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .score-warning {
      margin-top: 10px;
      padding: 10px 14px;
      background: #FFF0E8;
      border-radius: 10px;
      font-size: 13px;
      color: var(--primary);
      display: none;
    }

    .score-warning.show {
      display: block;
    }

    .btn-confirm:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .reset-section h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .btn-reset {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: #FFF0E8;
      color: var(--primary);
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .password-row {
      display: none;
      gap: 8px;
      margin-top: 10px;
    }

    .password-row.show {
      display: flex;
    }

    .password-row input {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 6px;
      outline: none;
      background: var(--bg);
      color: var(--text);
    }

    .password-row input:focus {
      border-color: var(--primary);
    }

    .btn-reset-confirm {
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 700;
    }

    .error-msg {
      font-size: 13px;
      color: #e74c3c;
      margin-top: 6px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="home">
    <div class="home-title">活動計分系統</div>

    <a href="scoring.html" class="home-btn">
      <div class="icon primary">✏️</div>
      計分
    </a>

    <a href="display.html" class="home-btn">
      <div class="icon">🏆</div>
      分數顯示
    </a>

    <button class="home-btn" onclick="openSettings()">
      <div class="icon">⚙️</div>
      設定
    </button>

    <div class="group-status" id="groupStatus"></div>
  </div>

  <!-- 設定 Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>設定</h2>

      <label>組別數</label>
      <input type="number" id="groupCountInput" min="1" max="20" value="4">
      <div class="score-warning" id="scoreWarning">目前有組別已有分數，請先重置才能更改組別數。</div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeSettings()">取消</button>
        <button class="btn-confirm" id="btnSaveGroups" onclick="saveSettings()">儲存組別數</button>
      </div>

      <hr class="divider">

      <div class="reset-section">
        <h3>重置</h3>
        <button class="btn-reset" onclick="showPasswordRow()">重置所有分數與組別</button>
        <div class="password-row" id="passwordRow">
          <input type="password" id="resetPassword" maxlength="4" inputmode="numeric" placeholder="密碼">
          <button class="btn-reset-confirm" onclick="confirmReset()">確認</button>
        </div>
        <div class="error-msg" id="resetError"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentState = { groupCount: 4, scores: [] };

    socket.on('sync', (state) => {
      currentState = state;
      document.getElementById('groupStatus').textContent = `目前設定：${state.groupCount} 組`;
      document.getElementById('groupCountInput').value = state.groupCount;
      updateGroupWarning();
      // 重置成功時關閉 Modal（密碼列已顯示代表是重置觸發的 sync）
      if (document.getElementById('passwordRow').classList.contains('show')) {
        closeSettings();
      }
    });

    socket.on('error', (msg) => {
      document.getElementById('resetError').textContent = msg;
    });

    function updateGroupWarning() {
      const hasScore = currentState.scores.some(s => s !== 0);
      document.getElementById('scoreWarning').classList.toggle('show', hasScore);
      document.getElementById('btnSaveGroups').disabled = hasScore;
    }

    function openSettings() {
      document.getElementById('passwordRow').classList.remove('show');
      document.getElementById('resetPassword').value = '';
      document.getElementById('resetError').textContent = '';
      document.getElementById('settingsModal').classList.add('open');
      updateGroupWarning();
    }

    function closeSettings() {
      document.getElementById('settingsModal').classList.remove('open');
    }

    function saveSettings() {
      const val = parseInt(document.getElementById('groupCountInput').value);
      if (!val || val < 1) return;
      socket.emit('set-groups', val);
      closeSettings();
    }

    function showPasswordRow() {
      document.getElementById('passwordRow').classList.add('show');
      document.getElementById('resetPassword').focus();
    }

    function confirmReset() {
      const pw = document.getElementById('resetPassword').value;
      document.getElementById('resetError').textContent = '';
      socket.emit('reset', pw);
    }

    document.getElementById('settingsModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSettings();
    });

    document.getElementById('resetPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') confirmReset();
    });
  </script>
</body>
</html>
